<main class="shell">
  <h1>Angular + Java Assessment</h1>
  <p class="subtitle">Base infrastructure — Angular 22 frontend · Spring Boot backend</p>

  <div class="health health--{{ status() }}">
    @switch (status()) {
      @case ('checking') {
        <span class="dot"></span> Checking backend…
      }
      @case ('connected') {
        <span class="dot"></span> Backend connected
      }
      @case ('error') {
        <span class="dot"></span> Backend unreachable
      }
    }
  </div>

  @if (detail()) {
    <p class="detail">{{ detail() }}</p>
  }
</main>
